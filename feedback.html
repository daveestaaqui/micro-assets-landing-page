<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'd love your feedback — OmniSuite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f4f1eb;
            --cream-dark: #e8e4dc;
            --forest: #2d6a4f;
            --forest-deep: #1b4332;
            --sky: #7fa8b8;
            --charcoal: #2c2c2c;
            --warm-gray: #6b6560;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        h1, h2 { font-family: 'Source Serif 4', Georgia, serif; }

        .card {
            background: #fff;
            border: 1px solid var(--cream-dark);
            border-radius: 16px;
            padding: 48px;
            max-width: 520px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            color: var(--forest-deep);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--warm-gray);
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .reasons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .reason {
            background: var(--cream);
            border: 1px solid var(--cream-dark);
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--charcoal);
        }

        .reason:hover {
            border-color: var(--forest);
            background: rgba(45, 106, 79, 0.03);
        }

        .reason.selected {
            border-color: var(--forest);
            background: rgba(45, 106, 79, 0.06);
        }

        .reason input { display: none; }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--cream-dark);
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .reason.selected .dot {
            border-color: var(--forest);
            background: var(--forest);
            box-shadow: inset 0 0 0 3px #fff;
        }

        textarea {
            width: 100%;
            background: var(--cream);
            border: 1px solid var(--cream-dark);
            border-radius: 10px;
            padding: 12px;
            color: var(--charcoal);
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 20px;
            font-family: inherit;
            line-height: 1.5;
        }

        textarea::placeholder { color: var(--warm-gray); }
        textarea:focus { outline: none; border-color: var(--forest); }

        .btn {
            background: var(--forest);
            color: #fff;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover { background: var(--forest-deep); transform: translateY(-1px); }

        .thanks { display: none; text-align: center; padding: 20px 0; }
        .thanks h2 { color: var(--forest); margin-bottom: 8px; font-size: 22px; }
        .thanks p { color: var(--warm-gray); font-size: 14px; line-height: 1.6; }
        .thanks a { color: var(--forest); text-decoration: none; font-weight: 600; }
        .thanks a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-view">
            <h1>We'd love your feedback</h1>
            <p class="subtitle">Help us build better tools — what made you uninstall?</p>
            <div class="reasons">
                <label class="reason" onclick="this.classList.toggle('selected')">
                    <span class="dot"></span>
                    <span>Didn't work as expected</span>
                    <input type="checkbox" value="broken">
                </label>
                <label class="reason" onclick="this.classList.toggle('selected')">
                    <span class="dot"></span>
                    <span>Found a better alternative</span>
                    <input type="checkbox" value="alternative">
                </label>
                <label class="reason" onclick="this.classList.toggle('selected')">
                    <span class="dot"></span>
                    <span>Too complicated to use</span>
                    <input type="checkbox" value="complex">
                </label>
                <label class="reason" onclick="this.classList.toggle('selected')">
                    <span class="dot"></span>
                    <span>Only needed it temporarily</span>
                    <input type="checkbox" value="temporary">
                </label>
                <label class="reason" onclick="this.classList.toggle('selected')">
                    <span class="dot"></span>
                    <span>Privacy or permissions concerns</span>
                    <input type="checkbox" value="privacy">
                </label>
            </div>
            <textarea id="details" placeholder="Anything else we should know? (optional)"></textarea>
            <button class="btn" onclick="submitFeedback()">Send Feedback</button>
        </div>
        <div class="thanks" id="thanks-view">
            <h2>Thank you</h2>
            <p>Your feedback helps us build better tools for everyone.<br><br>
            <a href="index.html#tools">Browse more OmniSuite tools →</a></p>
        </div>
    </div>
    <script>
        function submitFeedback() {
            var selected = [];
            document.querySelectorAll('.reason.selected input').forEach(function(i) { selected.push(i.value); });
            var details = document.getElementById('details').value;
            if (selected.length > 0 || details) {
                var body = 'Uninstall Reasons: ' + selected.join(', ') + '\n\nDetails: ' + details;
                window.open('mailto:flowkit.support@gmail.com?subject=Extension Feedback&body=' + encodeURIComponent(body), '_self');
            }
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('thanks-view').style.display = 'block';
        }
    </script>

<script>
// Mobile Navigation Toggle
document.addEventListener('DOMContentLoaded', () => {
    const toggle = document.getElementById('mobileToggle');
    const links = document.getElementById('navLinks');
    if (toggle && links) {
        toggle.addEventListener('click', () => {
            links.classList.toggle('active');
            toggle.classList.toggle('open');
        });
        
        // Close menu on link click
        links.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                links.classList.remove('active');
                toggle.classList.remove('open');
            });
        });
    }
    
    // Smooth sticky nav
    const nav = document.getElementById('mainNav');
    if (nav) {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
    }
});
</script>

</body>
</html>
